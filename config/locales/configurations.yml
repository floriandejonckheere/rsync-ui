en:
  configurations:
    categories:
      resource_usage:
        description: Settings for server resource usage probe (CPU, memory, disk)
        title: Resource usage
      system:
        description: Core system settings and technical parameters
        title: System configuration
      notifications:
        description: Settings for notifications sent on job lifecycle events
        title: Notifications
      features:
        description: Settings for optional application features
        title: Features
    keys:
      resource_usage:
        description: Enable or disable server resource usage probe
        cpu_critical:
          description: CPU usage percentage at which status is shown as critical (red)
        cpu_warning:
          description: CPU usage percentage at which status is shown as a warning (orange)
        disk_critical:
          description: Disk usage percentage at which status is shown as critical (red)
        disk_warning:
          description: Disk usage percentage at which status is shown as a warning (orange)
        interval:
          description: Interval in minutes between server resource usage probes
        memory_critical:
          description: Memory usage percentage at which status is shown as critical (red)
        memory_warning:
          description: Memory usage percentage at which status is shown as a warning (orange)
      scheduler:
        description: Enable or disable scheduled jobs
      notifications:
        description: Enable or disable user notifications on job start, success, and failure
      hooks:
        description: Enable or disable pre/post/success/failure hooks on job execution
